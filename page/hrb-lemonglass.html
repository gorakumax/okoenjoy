   <body><h1>ヘム社/レモングラス香</h1><h2>HEM LEMONGRASS</h2><p>ハーブで有名なイネ科の<STRONG>レモングラス</STRONG>のお香。<br /><br />点ける前はイネ科独特の匂いがして少々田舎っぽい(?)匂い。(笑<br /><br />火を点けた後はレモンによく似た爽やかな匂いがぱっと部屋中に広がります。<br /><br />まるで部屋の色まで変わるような気がします。<br /><br /><STRONG>虫除け効果</STRONG>もあるので空気を清浄にしてくれる感じですね。<br /><br />残り香は以外と長持ちするタイプで、<STRONG>爽やかな香り</STRONG>がそのまま漂います。<br /><br />気持ちのよいお香です。<br /><br />羽虫等の害虫除けとして効果を発揮します。<br /><br /><img src="../img/lemongrass.jpg" alt=""><br />
