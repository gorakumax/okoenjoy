   <body><h1>アナンス/オーロビンド香</h1><h2>ANANTH AUROBINDO</h2><p>そのままの<STRONG>匂いは沈丁花の花の香り</STRONG>にそっくりです。<br /><br />焚き始めは白檀と乳香とサルビアの花の匂いが混ざったようなとてもいい香りが漂い始めます。<br /><br />まるで、家の中に沈丁花の花が咲き誇る枝を持ち込んで来たような錯覚すら覚えます。<br /><br />ふんわりとして甘めで、日本人好みのする香りだと思います。<br /><br />焚き終わった後は、やはり沈丁花の花と乳香の混ざったような甘く爽やかな香りが残ります。<br /><br />残り香は割合長く残り、部屋全体がうっすらと良い香りで満たされ続けます。<br /><br />私が虜になったお香の一つですね。<br /><br /><img src="../img/aurobind.jpg" alt=""><br />
