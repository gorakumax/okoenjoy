</nav><h1>ヘム社/ブッダ香</h1><h2>HEM <SMALL>LORD</SMALL> BUDDHA</h2><p>ベルガモットの香りが静かに漂うお香です。<br /><br />火を点けるとベルガモットがほのかに香り始め杉やヒノキといった広葉樹系の香りと一緒になり部屋の中をふんわりと漂い始めます。<br /><br />華やかさには欠けるかもしれませんが、静かでとても落ち着くようなシトラス系のお香です。<br /><br />残り香は少し短めのタイプになります。<br /><br />読書など落ち着いて何かに集中して取り組みたい時はいいお香だと思います。<br /><img src="../img/budda.jpg" alt=""><br />
