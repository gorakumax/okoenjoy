   <body><h1>ナンディ/サンダル</h1><h2>NANDI DELUX  SANDAL</h2><p>点けずにおいておくと<STRONG>肉桂のような甘酸っぱい</STRONG>匂いがします。<br /><br />これもまた、サンダルの香りはあまり感じられません。<br /><br />火を点けてもやっぱりスパイシーな香り。サンダルの香りより肉桂の独特な匂いが強く香ります。<br /><br />焚き終わった後の方が奥底で流れるサンダルの甘さを感じ取る事が出来るでしょう。<br /><br />それが細く長く香り続けます。<br /><br />サンダル系はゆったりくつろぐ感じの物が多い中これは眠気覚ましや元気を出して頑張りたいときに使いたい個性的なサンダル香ですね。<br /><br />ゴキブリ等の害虫除けとして効果を発揮します。<br /><br /><img src="../img/nandi.jpg" alt=""><br />
